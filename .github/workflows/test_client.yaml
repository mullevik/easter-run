name: Test client

on:
  push:
    branches: 
    - main
    paths:
    - 'er-client/**'
  pull_request:
    branches: 
    - main
    paths:
    - 'er-client/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        path: er-client

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14

    - name: Install dependencies
      run: npm ci
      working-directory:
        er-client

    - name: Lint
      run: npm run lint
      working-directory:
        er-client

    - name: Test
      run: npm run test:unit
      working-directory:
        er-client

